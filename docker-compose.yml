services:
  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      API_PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-unipilot_python}?authSource=admin}
      REDIS_URL: redis://:${REDIS_PASSWORD:-unipilot_dev_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      AUTO_SEED_CATALOG: ${AUTO_SEED_CATALOG:-false}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-30}
      AI_RATE_LIMIT_WINDOW_MS: ${AI_RATE_LIMIT_WINDOW_MS:-60000}
      AI_RATE_LIMIT_MAX: ${AI_RATE_LIMIT_MAX:-10}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-unipilot_dev_internal_service_token_change_in_production}
      TRANSCRIPT_PARSER_URL: http://transcript-parser:${TRANSCRIPT_PARSER_PORT:-8010}
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT:-3001}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      E2E_GOOGLE_OAUTH_STUB: ${E2E_GOOGLE_OAUTH_STUB:-true}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_SCOPES: ${MICROSOFT_SCOPES:-User.Read Mail.Read offline_access}
      MICROSOFT_TOKEN_ENCRYPTION_KEY: ${MICROSOFT_TOKEN_ENCRYPTION_KEY:-}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      TECHNION_RAW_DIR: ${TECHNION_RAW_DIR:-/app/data/raw/technion}
      CATALOG_VAULT_WIKI_PATH: ${CATALOG_VAULT_WIKI_PATH:-/app/data/academic/wiki}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.llmod.ai/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-MB5R2CF-azure/text-embedding-3-small}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      EMBEDDING_INDEX_ENABLED: ${EMBEDDING_INDEX_ENABLED:-true}
      EMBEDDING_INDEX_CACHE_PATH: ${EMBEDDING_INDEX_CACHE_PATH:-/app/data/cache/wiki_embedding_index.json}
      EMBEDDING_INDEX_BATCH_SIZE: ${EMBEDDING_INDEX_BATCH_SIZE:-64}
    volumes:
      - ./services/data-engineering/data/raw/technion:/app/data/raw/technion:ro
      - ./services/data-engineering/data/catalog_valut/catalog_valut/wiki:/app/data/academic/wiki:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      transcript-parser:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  data-engineering:
    build:
      context: ./services/data-engineering
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-unipilot_python}?authSource=admin}
      MONGO_DB_NAME: ${MONGO_DB:-unipilot_python}
      LOG_LEVEL: ${DATA_ENGINEERING_LOG_LEVEL:-INFO}
      CATALOG_VAULT_PATH: ${CATALOG_VAULT_PATH:-data/catalog_valut}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.main", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./services/data-engineering/data/raw:/app/data/raw:ro
      - ./services/data-engineering/data/catalog_valut:/app/data/catalog_valut:ro
      - ./services/data-engineering/data/generated:/app/data/generated
      - ./services/data-engineering/data/reports:/app/data/reports
    networks:
      - unipilot-internal

  mongo:
    image: mongo:7.0.15
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-unipilot_python}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  redis:
    image: redis:7.4.0-alpine
    command:
      [
        "redis-server",
        "--save",
        "",
        "--appendonly",
        "no",
        "--requirepass",
        "${REDIS_PASSWORD:-unipilot_dev_redis_password}",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-unipilot_dev_redis_password}",
          "ping",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - unipilot-internal

  worker:
    build:
      context: ./services/worker
    env_file:
      - .env
    environment:
      WORKER_PORT: ${WORKER_PORT}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-unipilot_python}?authSource=admin}
      REDIS_URL: redis://:${REDIS_PASSWORD:-unipilot_dev_redis_password}@redis:6379
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-unipilot_dev_internal_service_token_change_in_production}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.WORKER_PORT||3002; fetch('http://localhost:'+port+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  ai:
    build:
      context: ./services/ai
    env_file:
      - .env
    environment:
      AI_SERVICE_PORT: ${AI_SERVICE_PORT}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-unipilot_dev_internal_service_token_change_in_production}
      ACADEMIC_WIKI_PATH: ${ACADEMIC_WIKI_PATH:-/app/data/academic/wiki}
      ACADEMIC_TECHNION_RAW_DIR: ${ACADEMIC_TECHNION_RAW_DIR:-/app/data/raw/technion}
      ACADEMIC_DEFAULT_SEMESTER_FILE: ${ACADEMIC_DEFAULT_SEMESTER_FILE:-courses_2025_201.json}
      ACADEMIC_CATALOG_JSON: ${ACADEMIC_CATALOG_JSON:-/app/data/raw/technion/courses_2025_201.json}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-5-mini}
      ADVISOR_MAX_RETRIEVAL_ITERATIONS: ${ADVISOR_MAX_RETRIEVAL_ITERATIONS:-5}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-unipilot_python}?authSource=admin}
      API_SERVICE_URL: http://api:${API_PORT:-8000}
      INTERNAL_API_TIMEOUT_SECONDS: ${INTERNAL_API_TIMEOUT_SECONDS:-60}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.llmod.ai/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-MB5R2CF-azure/text-embedding-3-small}
      EMBEDDING_ENABLED: ${EMBEDDING_ENABLED:-true}
      EMBEDDING_INDEX_ENABLED: ${EMBEDDING_INDEX_ENABLED:-true}
      EMBEDDING_INDEX_CACHE_PATH: ${EMBEDDING_INDEX_CACHE_PATH:-/app/data/cache/wiki_embedding_index.json}
      EMBEDDING_INDEX_BATCH_SIZE: ${EMBEDDING_INDEX_BATCH_SIZE:-64}
    volumes:
      - ./services/data-engineering/data/catalog_valut/catalog_valut/wiki:/app/data/academic/wiki:ro
      - ./services/data-engineering/data/raw/technion:/app/data/raw/technion:ro
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; port=os.environ.get('AI_SERVICE_PORT','3001'); urllib.request.urlopen(f'http://localhost:{port}/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  outlook-mcp:
    build:
      context: ./services/outlook-mcp
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB:-unipilot_python}?authSource=admin}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
      MICROSOFT_SCOPES: ${MICROSOFT_SCOPES:-User.Read Mail.Read offline_access}
      MICROSOFT_TOKEN_ENCRYPTION_KEY: ${MICROSOFT_TOKEN_ENCRYPTION_KEY:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-unipilot_dev_internal_service_token_change_in_production}
      OUTLOOK_MCP_LOG_LEVEL: ${OUTLOOK_MCP_LOG_LEVEL:-INFO}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - unipilot-internal

  transcript-parser:
    build:
      context: ./services/transcript-parser
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      TRANSCRIPT_PARSER_PORT: ${TRANSCRIPT_PARSER_PORT:-8010}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-unipilot_dev_internal_service_token_change_in_production}
      MAX_UPLOAD_BYTES: ${TRANSCRIPT_IMPORT_MAX_UPLOAD_BYTES:-5242880}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  web:
    build:
      context: ./services/web
      args:
        VITE_API_URL: /api
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/usr/share/nginx/html/index.html"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

networks:
  unipilot-internal:
    driver: bridge

volumes:
  mongo_data:
