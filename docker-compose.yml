services:
  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      API_PORT: 3000
      CATALOG_DATA_ROOT: /data
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.API_PORT||3000; fetch('http://localhost:'+port+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - ./data:/data:ro
    networks:
      - unipilot-internal

  api-python:
    build:
      context: ./services/api-python
    env_file:
      - .env
    environment:
      API_PYTHON_PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_PYTHON_DB:-unipilot_python}?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-5}
    ports:
      - "${API_PYTHON_PORT:-8000}:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  mongo:
    image: mongo:7.0.15
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  redis:
    image: redis:7.4.0-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - unipilot-internal

  worker:
    build:
      context: ./services/worker
    env_file:
      - .env
    environment:
      WORKER_PORT: ${WORKER_PORT}
      WORKER_QUEUE_NAME: ${WORKER_QUEUE_NAME}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:${AI_SERVICE_PORT}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.WORKER_PORT||3002; fetch('http://localhost:'+port+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

  ai:
    build:
      context: ./services/ai
    env_file:
      - .env
    environment:
      AI_SERVICE_PORT: ${AI_SERVICE_PORT}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.AI_SERVICE_PORT||3001; fetch('http://localhost:'+port+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - unipilot-internal

networks:
  unipilot-internal:
    driver: bridge

volumes:
  mongo_data:
