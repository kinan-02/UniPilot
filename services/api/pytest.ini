[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80
    --cov-config=pytest.ini

[coverage:run]
source = app

[coverage:report]
skip_covered = True
show_missing = True
fail_under = 80

