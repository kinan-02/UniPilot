[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = .
addopts = --cov=app --cov-report=term-missing:skip-covered -m "not live"
markers =
    live: makes real LLM API calls (costs money, non-deterministic, needs
        credentials) -- deselected by default, run explicitly with `pytest -m live`
