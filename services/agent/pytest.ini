[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80
    --cov-config=pytest.ini

[coverage:run]
source = app
omit =
    app/agent/evaluation/*
    app/retrieval/evaluation/*
    app/retrieval/build_wiki_vector_index.py
    app/agent/llm_*.py
    app/agent/workflows/general_academic_workflow.py
    app/agent/workflows/requirement_explanation_workflow.py

[coverage:report]
skip_covered = True
show_missing = True
fail_under = 80
