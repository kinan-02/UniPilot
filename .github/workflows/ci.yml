name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install API tooling
        run: pip install bandit pip-audit
      - name: Bandit (API)
        run: bandit -q -r services/api/app -x services/api/tests -ll
      - name: pip-audit (API)
        run: pip-audit -r services/api/requirements.txt
      - name: npm audit (web)
        working-directory: services/web
        run: npm ci && npm audit --audit-level=high

  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest

  data-engineering:
    name: Data engineering (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-engineering
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/data-engineering/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest
      - name: Verify elective chain contract (vault export)
        run: python ../../scripts/verify_elective_chains.py --faculty dds

  web:
    name: Web (Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test -- --run
      - name: Production build
        run: npm run build
