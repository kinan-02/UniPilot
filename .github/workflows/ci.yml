name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest --cov=app --cov-fail-under=80

  data-engineering:
    name: Data engineering (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-engineering
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/data-engineering/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest --cov=app --cov-fail-under=80

  web:
    name: Web (Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test -- --run
      - name: Production build
        run: npm run build
