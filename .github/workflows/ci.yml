name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install API tooling
        run: pip install bandit pip-audit
      - name: Bandit (API)
        run: bandit -q -r services/api/app -x services/api/tests -ll
      - name: pip-audit (API)
        run: pip-audit -r services/api/requirements.txt
      - name: npm audit (web)
        working-directory: services/web
        run: npm ci && npm audit --audit-level=high

  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest

  data-engineering:
    name: Data engineering (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/data-engineering
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/data-engineering/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run pytest with coverage gate
        run: pytest
      - name: Verify elective chain contract (vault export)
        run: python ../../scripts/verify_elective_chains.py --faculty dds

  web:
    name: Web (Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test -- --run
      - name: Production build
        run: npm run build

  e2e:
    name: Web (Playwright E2E)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Prepare environment
        run: |
          cp .env.example .env
          echo "AUTO_SEED_CATALOG=true" >> .env
          echo "GOOGLE_OAUTH_CLIENT_ID=e2e-stub-client" >> .env
          echo "GOOGLE_OAUTH_CLIENT_SECRET=e2e-stub-secret" >> .env
          echo "E2E_GOOGLE_OAUTH_STUB=true" >> .env
          echo "AUTH_RATE_LIMIT_MAX=120" >> .env
      - name: Start Docker stack
        run: docker compose up --build -d
      - name: Wait for web UI
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:3000/ >/dev/null; then
              echo "Web UI ready"
              exit 0
            fi
            echo "Waiting for web UI (${attempt}/60)..."
            sleep 5
          done
          docker compose ps
          docker compose logs --tail=80 web api
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/web/package-lock.json
      - name: Install web dependencies
        working-directory: services/web
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: services/web
        run: npx playwright install chromium --with-deps
      - name: Run Playwright E2E
        working-directory: services/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_WORKERS: 4
        run: npm run test:e2e
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: services/web/playwright-report/
          retention-days: 14
      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: services/web/test-results/
          retention-days: 14
      - name: Dump Docker logs on failure
        if: failure()
        run: docker compose logs --tail=120
